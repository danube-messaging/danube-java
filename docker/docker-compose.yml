# Danube single-broker setup for integration testing
# Usage: docker compose up -d && mvn -pl danube-client verify -P integration-tests

services:
  broker:
    container_name: "danube-test-broker"
    image: ghcr.io/danube-messaging/danube-broker:latest
    restart: on-failure
    environment:
      - RUST_LOG=danube_broker=info,danube_core=info,openraft=warn
    volumes:
      - ./danube_broker.yml:/etc/danube_broker.yml:ro
      - broker_data:/danube-data
    networks:
      - danube_test_net
    ports:
      - "6650:6650"
      - "50051:50051"
      - "9040:9040"
    command:
      [
        "--config-file",
        "/etc/danube_broker.yml",
        "--broker-addr",
        "0.0.0.0:6650",
        "--admin-addr",
        "0.0.0.0:50051",
        "--raft-addr",
        "0.0.0.0:7650",
        "--advertised-addr",
        "127.0.0.1:6650",
        "--prom-exporter",
        "0.0.0.0:9040",
      ]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6650'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  danube_test_net:
    name: danube_test_net
    driver: bridge

volumes:
  broker_data:
    name: danube_test_broker_data
